apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webapp # TODO 5 — Deployment piloté (webapp)
  minReplicas: 2 # TODO 6 — plancher (ex. 2)
  maxReplicas: 6 # TODO 7 — plafond (ex. 5)
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50 # TODO 8 — cible en % des requests (ex. 50)
