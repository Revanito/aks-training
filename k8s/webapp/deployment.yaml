apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: nginx:1.27.2-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m # TODO 1 — base de calcul du HPA (ex. 50m)
              memory: 64Mi
            limits:
              cpu: 200m # TODO 2 — plafond CPU (ex. 200m)
              memory: 128Mi
          envFrom:
            - secretRef:
                name: webapp-secret # TODO 4 — nom du Secret (webapp-secret)
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: content
          configMap:
            name: webapp-content # TODO 3 — nom de la ConfigMap (webappcontent)
